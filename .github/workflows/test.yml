name: Tests

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:

concurrency:
  group: acceptance-tests
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Configure Git for GitLab
        run: |
          git config --global url."https://gitlab-ci-token:${{ secrets.GITLAB_TOKEN }}@gitlab.com".insteadOf "https://gitlab.com"
      - run: go mod download
      - run: go build -v .

  test:
    name: Terraform Provider Acceptance Tests
    needs: build
    runs-on: 
      group: Default
    env:
      NEXAA_USERNAME: ${{ secrets.STAGING_NEXAA_CLOUD_USER }}
      NEXAA_PASSWORD: ${{ secrets.STAGING_NEXAA_CLOUD_PASSWORD }}
      TILAA_ENV: ${{ secrets.TILAA_ENV }}
      NEXAA_KEYCLOAK_URL: ${{ secrets.NEXAA_KEYCLOAK_URL }}
      NEXAA_GRAPHQL_URL: ${{ secrets.NEXAA_GRAPHQL_URL }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.15.*'
          # - '1.14.*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Build provider binary
        run: |
          mkdir -p "${HOME}/.terraform.d/plugins/registry.terraform.io/tilaa/nexaa/0.1.0/linux_amd64"
          go build -o "${HOME}/.terraform.d/plugins/registry.terraform.io/tilaa/nexaa/0.1.0/linux_amd64/terraform-provider-nexaa"

      - name: Write .terraformrc
        run: |
          cat <<EOF > ~/.terraformrc
          provider_installation {
            filesystem_mirror {
              path    = "${HOME}/.terraform.d/plugins"
              include = ["tilaa/nexaa"]
            }
            direct {}
          }
          EOF

      - name: Write minimal main.tf
        run: |
          mkdir -p test-tmp
          cat <<EOF > test-tmp/main.tf
          terraform {
            required_providers {
              nexaa = {
                source  = "tilaa/nexaa"
                version = "0.1.0"
              }
            }
          }
          EOF

      - name: Terraform init
        working-directory: test-tmp
        run: terraform init

      - name: Run Acceptance Tests
        env:
          USERNAME: ${{ secrets.STAGING_NEXAA_CLOUD_USER }}
          PASSWORD: ${{ secrets.STAGING_NEXAA_CLOUD_PASSWORD }}
          TILAA_ENV: ${{ secrets.TILAA_ENV }}
          NEXAA_KEYCLOAK_URL: ${{ secrets.NEXAA_KEYCLOAK_URL }}
          NEXAA_GRAPHQL_URL: ${{ secrets.NEXAA_GRAPHQL_URL }}
        working-directory: .
        run: TF_ACC=1 go test -v -cover ./internal/tests/...
